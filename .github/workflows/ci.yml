name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUN_CONFIG_REGISTRY: https://registry.npmjs.org/
      - run: bun run test:all
      - run: bun run build
