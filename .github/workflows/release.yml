name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-dmg:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:all

      - name: Build and publish macOS release (unsigned)
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run package:mac:publish
        env:
          ENABLE_AUTO_UPDATES: '1'
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS artifacts (unsigned, no publish)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: npm run package:mac
        env:
          ENABLE_AUTO_UPDATES: '1'
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: brewdeck-macos-${{ github.run_number }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
          retention-days: 14
