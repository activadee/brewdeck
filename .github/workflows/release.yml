name: Release

concurrency:
  group: release-${{ github.event.inputs.channel || github.ref_name }}
  cancel-in-progress: false

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*-beta.*'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: false
        default: stable
        type: choice
        options:
          - stable
          - beta
          - build-only
      version:
        description: Release version (for example 1.2.3 or v1.2.3); required for stable
        required: false
        type: string

permissions:
  contents: read

jobs:
  check_changes:
    name: Check for changes since last beta
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        name: Compare HEAD to last beta tag
        run: |
          last_beta_tag=$(git tag --list 'v*-beta.*' --sort=-creatordate | head -n 1)
          if [[ -z "$last_beta_tag" ]]; then
            echo "No previous beta tag found. Proceeding with release."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_beta_sha=$(git rev-parse "$last_beta_tag^{commit}")
          head_sha=$(git rev-parse HEAD)

          if [[ "$last_beta_sha" == "$head_sha" ]]; then
            echo "No changes on main since last beta release ($last_beta_tag). Skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected on main since $last_beta_tag ($last_beta_sha → $head_sha). Proceeding."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  preflight:
    name: Preflight
    needs: [check_changes]
    if: |
      !failure() && !cancelled() &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.channel != 'build-only') &&
      (github.event_name != 'schedule' || needs.check_changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      release_channel: ${{ steps.release_meta.outputs.release_channel }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_name: ${{ steps.release_meta.outputs.name }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
      ref: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref || 'main' }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Enable package manager from package.json
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - id: release_meta
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ github.event.inputs.channel }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" || ( "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_CHANNEL:-stable}" == "beta" ) ]]; then
            npx tsx scripts/resolve-prerelease.ts --github-output
            echo "release_channel=beta" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              raw="${DISPATCH_VERSION}"
              if [[ -z "$raw" ]]; then
                echo "workflow_dispatch stable releases require the version input." >&2
                exit 1
              fi
            else
              raw="${GITHUB_REF_NAME}"
            fi

            version="${raw#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release version: $raw" >&2
              exit 1
            fi

            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "name=Brewdeck v$version" >> "$GITHUB_OUTPUT"
            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Test
        run: npm run test:all

      - id: previous_tag
        name: Resolve previous release tag
        run: |
          npx tsx scripts/resolve-previous-release-tag.ts \
            --channel "${{ steps.release_meta.outputs.release_channel }}" \
            --current-tag "${{ steps.release_meta.outputs.tag }}" \
            --github-output

  build:
    name: Build macOS
    needs: preflight
    if: |
      !failure() && !cancelled() &&
      needs.preflight.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.channel != 'build-only')
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Enable package manager from package.json
        run: corepack enable

      - name: Align package version
        run: npx tsx scripts/update-release-package-version.ts "${{ needs.preflight.outputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts (unsigned)
        run: npm run package:mac:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for file in release/*.dmg release/*.zip release/*.yml; do
            cp "$file" release-publish/
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: release-publish/*
          if-no-files-found: error

  build_only:
    name: Build macOS (no publish)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'build-only'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Enable package manager from package.json
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:all

      - name: Build macOS artifacts (unsigned)
        run: npm run package:mac:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brewdeck-macos-${{ github.run_number }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    if: |
      !failure() && !cancelled() &&
      needs.preflight.result == 'success' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - id: app_token
        name: Mint release app token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          name: desktop-macos
          path: release-assets

      - name: Publish release
        if: needs.preflight.outputs.previous_tag != '' && steps.app_token.outputs.token != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          previous_tag: ${{ needs.preflight.outputs.previous_tag }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.make_latest == 'true' }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.yml
          fail_on_unmatched_files: true
          token: ${{ steps.app_token.outputs.token }}

      - name: Publish release (GITHUB_TOKEN)
        if: needs.preflight.outputs.previous_tag != '' && steps.app_token.outputs.token == ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          previous_tag: ${{ needs.preflight.outputs.previous_tag }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.make_latest == 'true' }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.yml
          fail_on_unmatched_files: true

      - name: Publish first release
        if: needs.preflight.outputs.previous_tag == '' && steps.app_token.outputs.token != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.make_latest == 'true' }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.yml
          fail_on_unmatched_files: true
          token: ${{ steps.app_token.outputs.token }}

      - name: Publish first release (GITHUB_TOKEN)
        if: needs.preflight.outputs.previous_tag == '' && steps.app_token.outputs.token == ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.make_latest == 'true' }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.yml
          fail_on_unmatched_files: true

  finalize:
    name: Finalize release
    needs: [preflight, release]
    if: |
      !failure() && !cancelled() &&
      needs.preflight.result == 'success' &&
      needs.release.result == 'success' &&
      needs.preflight.outputs.release_channel == 'stable' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.channel != 'build-only')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - id: app_token
        name: Mint release app token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: true

      - id: app_bot
        name: Resolve GitHub App bot identity
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - id: update_versions
        name: Update package version
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: npx tsx scripts/update-release-package-version.ts "$RELEASE_VERSION" --github-output

      - name: Commit and push version bump
        if: steps.update_versions.outputs.changed == 'true'
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          git config user.name "${{ steps.app_bot.outputs.name }}"
          git config user.email "${{ steps.app_bot.outputs.email }}"
          git add package.json
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git push origin HEAD:main
