name: Release

concurrency:
  group: release-${{ github.event.inputs.ref_tag || github.event.inputs.release_type || github.ref_name }}
  cancel-in-progress: false

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: build-only
        type: choice
        options:
          - build-only
          - stable
      version:
        description: 'Stable version X.Y.Z (optional; defaults from package.json on main)'
        required: false
        type: string
      ref_tag:
        description: 'Internal: tag to build (set by Bump and Tag)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  prepare_stable:
    name: Tag stable release
    if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'stable'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.resolve_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve stable version
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            version="${INPUT_VERSION#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid stable version: $INPUT_VERSION" >&2
              exit 1
            fi
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
          else
            npx tsx scripts/resolve-stable-release.ts --github-output
          fi

      - id: resolve_sha
        name: Resolve commit SHA
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create and push stable tag
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; reusing it for this release run."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" HEAD
          git push origin "$TAG"

  preflight:
    name: Preflight
    needs: [prepare_stable]
    if: |
      always() &&
      needs.prepare_stable.result != 'failure' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        inputs.ref_tag != '' ||
        needs.prepare_stable.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_name: ${{ steps.release_meta.outputs.name }}
      release_channel: ${{ steps.release_meta.outputs.release_channel }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
      ref: ${{ steps.resolve_ref.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - id: resolve_ref
        name: Resolve release ref
        shell: bash
        run: |
          if [[ -n "${{ inputs.ref_tag }}" ]]; then
            tag="${{ inputs.ref_tag }}"
            sha="$(git rev-list -n 1 "$tag")"
          elif [[ "${{ needs.prepare_stable.result }}" == "success" ]]; then
            tag="${{ needs.prepare_stable.outputs.tag }}"
            sha="${{ needs.prepare_stable.outputs.sha }}"
          else
            tag="${GITHUB_REF_NAME}"
            sha="${GITHUB_SHA}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - id: release_meta
        name: Resolve release metadata
        shell: bash
        run: |
          raw="${{ steps.resolve_ref.outputs.tag }}"
          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$raw" >> "$GITHUB_OUTPUT"
          echo "name=Brewdeck v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_channel=beta" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - id: previous_tag
        name: Resolve previous release tag
        run: |
          npx tsx scripts/resolve-previous-release-tag.ts \
            --channel "${{ steps.release_meta.outputs.release_channel }}" \
            --current-tag "${{ steps.release_meta.outputs.tag }}" \
            --github-output

  build:
    name: Build macOS
    needs: [prepare_stable, preflight]
    if: |
      always() &&
      needs.prepare_stable.result != 'failure' &&
      needs.preflight.result == 'success'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Enable package manager from package.json
        run: corepack enable

      - name: Align package version
        run: npx tsx scripts/update-release-package-version.ts "${{ needs.preflight.outputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:all

      - name: Build macOS artifacts (unsigned)
        run: npm run package:mac:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brewdeck-macos-${{ needs.preflight.outputs.tag }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: [prepare_stable, preflight, build]
    if: |
      always() &&
      needs.prepare_stable.result != 'failure' &&
      needs.preflight.result == 'success' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: brewdeck-macos-${{ needs.preflight.outputs.tag }}
          path: release-assets

      - name: Publish release
        if: needs.preflight.outputs.previous_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          previous_tag: ${{ needs.preflight.outputs.previous_tag }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.make_latest == 'true' }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.yml
          fail_on_unmatched_files: true

      - name: Publish first release
        if: needs.preflight.outputs.previous_tag == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.make_latest == 'true' }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.yml
          fail_on_unmatched_files: true

  # Human "build-only" only — Bump and Tag also dispatches with release_type=build-only but sets ref_tag.
  manual-build:
    name: Manual unsigned build
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.release_type == 'build-only' &&
      inputs.ref_tag == ''
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Enable package manager from package.json
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:all

      - name: Build macOS artifacts (unsigned, no publish)
        run: npm run package:mac:ci
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brewdeck-macos-${{ github.run_number }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
          retention-days: 14
