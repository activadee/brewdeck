name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-dmg:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUN_CONFIG_REGISTRY: https://registry.npmjs.org/

      - name: Test
        run: bun run test:all

      - name: Build and publish macOS release (unsigned)
        if: startsWith(github.ref, 'refs/tags/')
        run: bun run package:mac:publish
        env:
          ENABLE_AUTO_UPDATES: '1'
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS artifacts (unsigned, no publish)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: bun run package:mac
        env:
          ENABLE_AUTO_UPDATES: '1'
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: brew-sidebar-macos-${{ github.run_number }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
          retention-days: 14
