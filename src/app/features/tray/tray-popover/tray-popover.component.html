<div class="brew-shell brew-tray-shell ui-shell-enter h-full">
  <header class="brew-titlebar brew-titlebar-compact brew-tray-titlebar window-titlebar">
    <div class="brew-titlebar-left">
      <span class="brew-titlebar-app">Brewdeck</span>
    </div>

    <div class="brew-titlebar-center">
      <span class="brew-tray-status-badge">
        @if (updatesStore.updateCount() > 0) {
          {{ updatesStore.updateCount() }} updates
        } @else {
          Up to date
        }
      </span>
    </div>

    <div class="brew-titlebar-right no-drag">
      <button type="button" z-button zType="ghost" zSize="sm" class="brew-tray-check-now no-drag" (click)="checkNow()">
        Check now
      </button>
    </div>
  </header>

  <section class="brew-tray-status-row">
    <app-connection-status-pill
      class="brew-tray-connection-pill"
      [available]="appStatusStore.availability()?.available ?? false"
      [version]="appStatusStore.availability()?.version ?? null"
    />

    <div class="brew-tray-last-check">
      <span class="brew-tray-last-check-label">Last check</span>
      <time class="brew-tray-last-check-time mono">{{ lastCheckTime() }}</time>
    </div>
  </section>

  <section class="brew-tray-content">
    <p class="brew-tray-status-message">
      @if (updatesStore.updateCount() > 0) {
        {{ updatesStore.updateCount() }} updates are available.
      } @else {
        No updates currently pending.
      }
    </p>

    <div class="brew-tray-interval">
      <p class="brew-tray-interval-label">Check interval</p>
      <z-segmented
        class="brew-tray-segmented"
        zSize="sm"
        [zOptions]="intervalOptions"
        [ngModel]="selectedInterval()"
        (ngModelChange)="onIntervalChange($event)"
        zAriaLabel="Tray check interval"
      />
    </div>

    <button type="button" z-button class="brew-tray-open-btn w-full" (click)="openMain()">Open app</button>
  </section>
</div>
