<nav
  class="sticky top-0 z-10 -mx-1 overflow-x-auto border-b border-border/60 bg-background/90 px-1 py-2 backdrop-blur-sm"
  aria-label="Settings sections"
>
  <ul class="flex min-w-max gap-1">
    @for (section of sections(); track section.id) {
      <li>
        <a
          class="inline-flex items-center gap-1.5 rounded-md px-2.5 py-1.5 text-xs font-medium transition-colors"
          [class]="
            activeSectionId() === section.id
              ? 'bg-accent text-accent-foreground'
              : 'text-muted-foreground hover:bg-muted/60 hover:text-foreground'
          "
          [href]="'#settings-' + section.id"
          [attr.aria-current]="activeSectionId() === section.id ? 'location' : null"
          (click)="scrollToSection(section.id); $event.preventDefault()"
        >
          <z-icon [zType]="section.icon" zSize="sm" class="opacity-80" />
          {{ section.label }}
        </a>
      </li>
    }
  </ul>
</nav>
