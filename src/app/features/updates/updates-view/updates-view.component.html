
    <section class="ui-shell-enter space-y-2">
      <header class="flex flex-wrap items-center justify-between gap-2">
        <h2 class="text-lg font-semibold">Available Updates</h2>
        <div class="flex gap-1.5">
          <button
            type="button"
            z-button
            zType="outline"
            zSize="sm"
            (click)="updatesStore.checkNow()"
            [zDisabled]="updatesStore.loading()"
          >
            Check now
          </button>
          <button
            type="button"
            z-button
            zSize="sm"
            (click)="openUpgradeAll()"
            [zDisabled]="updatesStore.updateCount() === 0 || actionBusy()"
          >
            Upgrade all
          </button>
          <button
            type="button"
            z-button
            zType="outline"
            zSize="sm"
            (click)="openSmartUpgrade()"
            [zDisabled]="updatesStore.updateCount() === 0 || actionBusy()"
          >
            Smart upgrade
          </button>
        </div>
      </header>

      <app-update-summary-card
        [count]="updatesStore.updateCount()"
        [criticalCount]="channelCounts().critical"
        [securityCount]="channelCounts().security"
        [normalCount]="channelCounts().normal"
        [lastCheckedAt]="updatesStore.lastCheckedAt()"
      />

      <app-package-search-input [value]="updatesStore.query()" (valueChange)="updatesStore.setQuery($event)" />

      <app-package-filter-chips
        [selected]="updatesStore.kindFilter()"
        [options]="filterOptions"
        (selectedChange)="onFilterChange($event)"
      />

      <app-package-filter-chips
        [selected]="updatesStore.pinFilter()"
        [options]="pinFilterOptions()"
        (selectedChange)="onPinFilterChange($event)"
      />

      <app-package-filter-chips
        [selected]="channelFilter()"
        [options]="channelFilterOptions()"
        (selectedChange)="onChannelFilterChange($event)"
      />

      @if (updatesStore.loading()) {
        <app-loading-state label="Checking outdated packages…" />
      } @else if (updatesStore.error()) {
        <app-empty-state label="Update check failed" [description]="updatesStore.error() ?? ''" />
      } @else if (channelFilteredItems().length === 0) {
        <app-empty-state
          [label]="emptyStateLabel()"
          [description]="emptyStateDescription()"
        />
      } @else {
        @if (selectionStore.count() > 0) {
          <div class="flex flex-wrap items-center gap-2 rounded-lg border border-border/60 bg-muted/20 p-2">
            <span class="text-sm">{{ selectionStore.count() }} selected</span>
            <button type="button" z-button zSize="sm" (click)="batchUpgradeSelected()">Upgrade selected</button>
            <button type="button" z-button zType="outline" zSize="sm" (click)="selectionStore.clear()">Clear</button>
          </div>
        }

        <div class="stagger-list space-y-1.5">
          @for (item of channelFilteredItems(); track item.id) {
            <app-package-row
              [selectable]="true"
              [selected]="selectionStore.isSelected(item.id)"
              (selectionChange)="selectionStore.toggle(item.id)"
              [name]="item.name"
              [kind]="item.kind"
              [desc]="versionLabel(item)"
              [pinned]="item.pinned"
              [smartUpgradeBlocked]="smartUpgradeBlocked(item)"
              [updateChannel]="updateChannelFor(item)"
              [installedVersion]="item.installedVersions.at(0) ?? null"
              [currentVersion]="item.currentVersion"
              [actionLabel]="upgradeActionLabel(item)"
              [actionVariant]="upgradeActionVariant(item)"
              [actionDisabled]="upgradeActionDisabled(item)"
              [overflowActions]="overflowActionsFor(item)"
              (action)="openUpgradeOne(item)"
              (overflowAction)="onOverflowAction(item, $event)"
            />
          }
        </div>
      }
    </section>

    <app-upgrade-confirm-dialog
      [open]="confirmOpen()"
      [title]="dialogTitle()"
      [message]="dialogMessage()"
      [confirmLabel]="dialogConfirmLabel()"
      [busy]="updatesStore.upgrading()"
      (cancel)="closeDialog()"
      (confirm)="confirmUpgrade()"
    />

    <app-smart-upgrade-dialog
      [open]="smartDialogIsOpen()"
      [plan]="updatesStore.smartPlan()"
      [selectedRisks]="selectedSmartRisks()"
      [busy]="updatesStore.smartPlanning() || updatesStore.smartRunning()"
      [error]="updatesStore.error()"
      (selectedRisksChange)="onSmartRisksChange($event)"
      (cancel)="closeSmartUpgradeDialog()"
      (confirm)="confirmSmartUpgrade()"
    />
