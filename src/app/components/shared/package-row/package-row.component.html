
    <z-card class="fade-up border-border/70 bg-card/95 shadow-sm">
      <div class="flex items-start justify-between gap-2">
        @if (selectable()) {
          <input
            type="checkbox"
            class="mt-1"
            [checked]="selected()"
            (change)="selectionChange.emit($any($event.target).checked)"
            (click)="$event.stopPropagation()"
          />
        }
        <div class="min-w-0">
          <h4 class="truncate text-sm font-semibold">{{ name() }}</h4>
          @if (desc()) {
            <p class="mt-0.5 text-xs text-muted-foreground">{{ desc() }}</p>
          }
          <app-package-meta
            [kind]="kind()"
            [pinned]="pinned()"
            [smartUpgradeBlocked]="smartUpgradeBlocked()"
            [updateChannel]="updateChannel()"
            [installedVersion]="installedVersion()"
            [currentVersion]="currentVersion()"
            [tap]="tap()"
            [deprecated]="deprecated()"
            [disabled]="disabled()"
            [replacement]="replacement()"
          />
        </div>

        <div class="flex items-center gap-1.5">
          @if (actionLabel(); as label) {
            <app-package-action-button
              [label]="label"
              [disabled]="actionDisabled()"
              [variant]="actionVariant()"
              (pressed)="action.emit()"
            />
          }

          @if (overflowActions().length > 0) {
            <app-package-row-overflow-menu
              [actions]="overflowActions()"
              (selected)="overflowAction.emit($event)"
            />
          }
        </div>
      </div>
    </z-card>
