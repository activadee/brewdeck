<z-card class="border-dashed p-4">
  <h3 class="text-sm font-semibold">{{ title() }}</h3>
  <p class="mt-1 whitespace-pre-wrap text-sm text-muted-foreground">{{ message() }}</p>
  <div class="mt-3">
    <z-button zType="secondary" zSize="sm" (click)="copy()">Copy diagnostics</z-button>
  </div>
</z-card>
